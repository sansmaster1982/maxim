name: Build & Upload iOS (TestFlight)

# Сборка/подпись/заливка iOS БЕЗ Mac — на macOS-раннере GitHub Actions.
# Схема перенесена из sansmaster1982/DarkMessage-iOS (тот же набор секретов),
# но шаг сборки адаптирован под Flutter (flutter build ios + xcodebuild archive).
# Запуск вручную: вкладка Actions -> этот workflow -> Run workflow.

on:
  workflow_dispatch:

env:
  # Бандл maxim. Должен быть зарегистрирован как App ID в Apple Developer,
  # и под него выпущен distribution provisioning profile (см. docs/IOS_RELEASE.md).
  BUNDLE_ID: com.maxim.ios
  FLUTTER_VERSION: "3.29.2"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: CocoaPods install
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Set build number
        run: |
          echo "BUILD_NUMBER=$(date +%y%m%d%H%M)" >> "$GITHUB_ENV"

      - name: Install signing credentials
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/build_certificate.p12
          PP=$RUNNER_TEMP/build_pp.mobileprovision
          KC=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"

          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychain -d user -s "$KC"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP")")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "Profile UUID: $PROFILE_UUID"

      - name: Detect signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" \
            | grep "Apple Distribution\|iPhone Distribution" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

      - name: Build Flutter (no codesign)
        run: flutter build ios --release --no-codesign --build-number="$BUILD_NUMBER"

      - name: Archive (signed)
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST

      - name: Export & Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
